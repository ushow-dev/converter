services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: scanner
      POSTGRES_PASSWORD: scanner
      POSTGRES_DB: scanner
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scanner"]
      interval: 5s
      timeout: 3s
      retries: 10

  scanner:
    build: .
    env_file: .env
    ports:
      - "${SCANNER_API_PORT:-8080}:8080"
    volumes:
      - ${INCOMING_HOST_DIR}:/incoming
      - ${LIBRARY_HOST_DIR}:/library
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
