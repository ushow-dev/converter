# =========================================
# HTTP -> HTTPS redirect + ACME challenge
# =========================================

server {
    listen 80;
    server_name admin.ptrack.ink api.ptrack.ink upload.ptrack.ink media.ptrack.ink player.ptrack.ink;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# =========================================
# ADMIN FRONTEND
# =========================================

server {
    listen 443 ssl http2;
    server_name admin.ptrack.ink;

    ssl_certificate /etc/letsencrypt/live/admin.ptrack.ink/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.ptrack.ink/privkey.pem;

    # Frontend itself is small traffic; upload endpoint is on upload.ptrack.ink.
    client_max_body_size 50g;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

# =========================================
# API
# =========================================

server {
    listen 443 ssl http2;
    server_name api.ptrack.ink;

    ssl_certificate /etc/letsencrypt/live/admin.ptrack.ink/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.ptrack.ink/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# =========================================
# LARGE FILE UPLOAD (direct to API)
# =========================================

server {
    listen 443 ssl http2;
    server_name upload.ptrack.ink;

    ssl_certificate /etc/letsencrypt/live/upload.ptrack.ink/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/upload.ptrack.ink/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50g;
    client_body_timeout 3600s;

    # Dedicated endpoint for huge uploads from admin frontend.
    location = /api/admin/jobs/upload {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        return 404;
    }
}

# =========================================
# MEDIA / HLS STREAMING
# =========================================

server {
    listen 443 ssl http2;
    server_name media.ptrack.ink;

    ssl_certificate /etc/letsencrypt/live/admin.ptrack.ink/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.ptrack.ink/privkey.pem;

    # Must match API env: MEDIA_SIGNING_KEY
    set $hls_signing_secret "4VfFKjtqqkLN";

    # Signed HLS delivery (.m3u8/.ts)
    # Token is bound to movie scope: /media/converted/mov_<id>/...
    location ~* ^(?<hls_scope>/media/converted/mov_[A-Za-z0-9]+/).+\.(m3u8|ts)$ {
        secure_link $arg_st,$arg_e;
        secure_link_md5 "$secure_link_expires$hls_scope$hls_signing_secret";

        if ($secure_link = "") {
            return 403;
        }
        if ($secure_link = "0") {
            return 410;
        }

        root /opt/converter;

        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t ts;
        }

        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;

        # Keep playlists and segments short-lived in caches.
        add_header Cache-Control "no-store";

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        # Rewrite playlist internals so child playlists/segments also carry
        # the same signature in query params (works for native + hls.js).
        sub_filter_once off;
        sub_filter_types application/vnd.apple.mpegurl;
        sub_filter ".m3u8" ".m3u8?e=$arg_e&st=$arg_st";
        sub_filter ".ts" ".ts?e=$arg_e&st=$arg_st";

        try_files $uri =404;
    }

    location /media/ {
        alias /opt/converter/media/;

        # Safety fallback: if request did not hit signed HLS location above,
        # never serve HLS playlists/segments from the generic media location.
        if ($uri ~* \.(m3u8|ts)$) {
            return 403;
        }

        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t ts;
        }

        # streaming optimization
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;

        # caching
        add_header Cache-Control "public, max-age=3600";

        # CORS for video players
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        try_files $uri =404;
    }
}

# =========================================
# PLAYER FRONTEND
# =========================================

server {
    listen 443 ssl http2;
    server_name player.ptrack.ink;

    ssl_certificate /etc/letsencrypt/live/player.ptrack.ink/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/player.ptrack.ink/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
