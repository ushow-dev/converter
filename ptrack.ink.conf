# =========================================
# HTTP → HTTPS redirect
# =========================================

server {
    listen 80;
    server_name admin.ptrack.ink api.ptrack.ink media.ptrack.ink;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# =========================================
# ADMIN FRONTEND
# =========================================

server {
    listen 443 ssl http2;
    server_name admin.ptrack.ink;

    ssl_certificate /etc/letsencrypt/live/admin.ptrack.ink/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.ptrack.ink/privkey.pem;

    location / {

        proxy_pass http://127.0.0.1:3000;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header X-Forwarded-Proto https;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

    }
}

# =========================================
# API
# =========================================

server {
    listen 443 ssl http2;
    server_name api.ptrack.ink;

    ssl_certificate /etc/letsencrypt/live/admin.ptrack.ink/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.ptrack.ink/privkey.pem;

    location / {

        proxy_pass http://127.0.0.1:8000;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header X-Forwarded-Proto https;

    }
}

# =========================================
# MEDIA / HLS STREAMING
# =========================================

server {
    listen 443 ssl http2;
    server_name media.ptrack.ink;

    ssl_certificate /etc/letsencrypt/live/admin.ptrack.ink/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.ptrack.ink/privkey.pem;

    # Must match API env: MEDIA_SIGNING_KEY
    set $hls_signing_secret "4VfFKjtqqkLN";

    # Signed HLS delivery (.m3u8/.ts)
    # Token is bound to movie scope: /media/converted/<movie_id>/...
    location ~* ^(?<hls_scope>/media/converted/[0-9]+/).+\.(m3u8|ts)$ {
        # Use query params first; for nested playlist/segment requests
        # fall back to signed values stored in cookies.
        set $hls_st $arg_st;
        set $hls_e $arg_e;
        if ($hls_st = "") { set $hls_st $cookie_hls_st; }
        if ($hls_e = "") { set $hls_e $cookie_hls_e; }

        secure_link $hls_st,$hls_e;
        secure_link_md5 "$secure_link_expires$hls_scope$hls_signing_secret";

        if ($secure_link = "") {
            return 403;
        }
        if ($secure_link = "0") {
            return 410;
        }

        root /opt/converter;

        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t ts;
        }

        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;

        # Keep playlists and segments short-lived in caches.
        add_header Cache-Control "no-store";

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Set-Cookie "hls_st=$hls_st; Max-Age=120; Path=/media/; Secure; HttpOnly; SameSite=None" always;
        add_header Set-Cookie "hls_e=$hls_e; Max-Age=120; Path=/media/; Secure; HttpOnly; SameSite=None" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        try_files $uri =404;
    }

    location /media/ {

        alias /opt/converter/media/;

        # Safety fallback: if request did not hit signed HLS location above,
        # never serve HLS playlists/segments from the generic media location.
        if ($uri ~* \.(m3u8|ts)$) {
            return 403;
        }

        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t ts;
        }

        # streaming optimization
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;

        # caching
        add_header Cache-Control "public, max-age=3600";

        # CORS for video players
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        try_files $uri =404;
    }
}

server {
    listen 80;
    server_name player.ptrack.ink;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name player.ptrack.ink;

    ssl_certificate /etc/letsencrypt/live/player.ptrack.ink/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/player.ptrack.ink/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}