# =========================================
# HTTP -> HTTPS redirect + ACME challenge
# =========================================

server {
    listen 80;
    server_name pimor.online admin.pimor.online api.pimor.online media.pimor.online player.pimor.online;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# =========================================
# ADMIN FRONTEND
# =========================================

server {
    listen 443 ssl http2;
    server_name admin.pimor.online;

    ssl_certificate     /etc/letsencrypt/live/pimor.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pimor.online/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50g;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

# =========================================
# API
# =========================================

server {
    listen 443 ssl http2;
    server_name api.pimor.online;

    ssl_certificate     /etc/letsencrypt/live/pimor.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pimor.online/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50g;
    client_body_timeout 3600s;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

# =========================================
# MEDIA / HLS STREAMING
# =========================================

server {
    listen 443 ssl http2;
    server_name media.pimor.online;

    ssl_certificate     /etc/letsencrypt/live/pimor.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pimor.online/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Must match MEDIA_SIGNING_KEY in .env
    set $hls_signing_secret "4VfFKjtqqkLN";

    # Signed HLS delivery (.m3u8/.ts)
    # Token is bound to /<content_type>/<storage_key>/ scope.
    # Supports: /movies/, /serials/, /tv/
    location ~* ^(?<hls_scope>/(movies|serials|tv)/[A-Za-z0-9_]+/).+\.(m3u8|ts)$ {
        secure_link $arg_st,$arg_e;
        secure_link_md5 "$secure_link_expires$hls_scope$hls_signing_secret";

        if ($secure_link = "") {
            return 403;
        }
        if ($secure_link = "0") {
            return 410;
        }

        # root + uri = /opt/converter/media/converted/<content_type>/<key>/...
        root /opt/converter/media/converted;

        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t                    ts;
        }

        sendfile   on;
        tcp_nopush on;
        tcp_nodelay on;

        add_header Cache-Control              "no-store";
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        sub_filter_once off;
        sub_filter_types application/vnd.apple.mpegurl;
        sub_filter ".m3u8" ".m3u8?e=$arg_e&st=$arg_st";
        sub_filter ".ts"   ".ts?e=$arg_e&st=$arg_st";

        try_files $uri =404;
    }

    # Generic media (thumbnails, posters, subtitles — unsigned)
    # Covers /movies/, /serials/, /tv/ — HLS blocked here, must go through signed block above.
    location ~* ^/(movies|serials|tv)/ {
        root /opt/converter/media/converted;

        # Never serve HLS from generic location
        if ($uri ~* \.(m3u8|ts)$) {
            return 403;
        }

        sendfile   on;
        tcp_nopush on;
        tcp_nodelay on;

        add_header Cache-Control              "public, max-age=3600";
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        try_files $uri =404;
    }
}

# =========================================
# PLAYER FRONTEND
# =========================================

server {
    listen 443 ssl http2;
    server_name player.pimor.online;

    ssl_certificate     /etc/letsencrypt/live/pimor.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pimor.online/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    }
}
