<!--
  Standalone iframe embed player.
  Supported query params:
    - imdb=<id>        (accepted, reserved for future mapping)
    - src=<m3u8 url>   (optional override)
    - poster=<url>     (optional override)
-->

<script>
  const PRE_ROLL_VAST_TAG = "https://proton9.engine.adglare.net/?320596439";
  const MID_ROLL_VAST_TAG = "https://proton9.engine.adglare.net/?320596439";
</script>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.6.15/dist/hls.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.fluidplayer.com/3.57.0/fluidplayer.min.js" crossorigin="anonymous"></script>

<style>
  .unified-player-wrapper { width: 100% !important; max-width: 1000px; margin: 0 auto; background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  .player-aspect { width: 100%; aspect-ratio: 16/9; background: #000; }
  @supports not (aspect-ratio: 16/9) {
    .player-aspect { position: relative; }
    .player-aspect::before { content: ""; display: block; padding-top: 56.25%; }
    .player-aspect > video { position: absolute; inset: 0; }
  }
  .player-aspect > video { width: 100%; height: 100%; display: block; }
  .fluid_video_wrapper { width: 100% !important; }

  .quality-quickbar { display: inline-flex; position: relative; }
  .settings-trigger { width: 28px; height: 24px; padding: 0; border: 1px solid #4a4a4a; border-radius: 3px; background: rgba(8, 8, 8, 0.9); color: #d7d7d7; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .settings-trigger svg { width: 14px; height: 14px; display: block; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .settings-trigger:disabled { opacity: 0.45; cursor: not-allowed; }
  .settings-menu { min-width: 120px; background: rgba(8, 8, 8, 0.96); border: 1px solid #444; border-radius: 4px; padding: 4px; box-shadow: 0 8px 20px rgba(0,0,0,.45); overflow: hidden; position: absolute; right: 0; bottom: 28px; z-index: 34; display: none; }
  .quality-item { display: block; width: 100%; box-sizing: border-box; margin: 0; padding: 6px 9px; border: 0; background: transparent; color: #d7d7d7; text-align: left; font-size: 12px; line-height: 1.2; cursor: pointer; border-radius: 3px; }
  .quality-item:hover { background: #1f1f1f; }
  .quality-item.is-active { color: #0f0; }

  .quality-quickbar.in-player { position: absolute; right: 110px; bottom: 7px; z-index: 30; opacity: 0; pointer-events: none; transition: opacity .16s ease; }
  .fluid_video_wrapper:hover .quality-quickbar.in-player, .fluid_video_wrapper:focus-within .quality-quickbar.in-player, .quality-quickbar.in-player.is-open { opacity: 1; pointer-events: auto; }
  .fluid_video_wrapper.fluid_player_layout_fullscreen .quality-quickbar.in-player { right: 132px; bottom: 12px; }
</style>

<div class="unified-player-wrapper">
  <div class="player-aspect">
    <video id="universal-video-player" data-src="/video/master.m3u8" poster="/video/preview.jpg" controls playsinline webkit-playsinline crossorigin="anonymous" preload="metadata"></video>
  </div>

  <div class="quality-quickbar" id="quality-quickbar">
    <button type="button" class="settings-trigger" id="settings-trigger" aria-label="Player settings">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M10 2h4l1 3a7 7 0 0 1 2 1l3-1 2 3-2 2a7 7 0 0 1 0 3l2 2-2 3-3-1a7 7 0 0 1-2 1l-1 3h-4l-1-3a7 7 0 0 1-2-1l-3 1-2-3 2-2a7 7 0 0 1 0-3l-2-2 2-3 3 1a7 7 0 0 1 2-1z"></path>
        <circle cx="12" cy="12" r="3.2"></circle>
      </svg>
    </button>
    <div class="settings-menu" id="settings-quality-list">
      <button type="button" class="quality-item is-active" data-quality="auto">auto</button>
    </div>
  </div>
</div>

<script>
  (function () {
    var video = document.getElementById("universal-video-player");
    if (!video) return;

    var params = new URLSearchParams(window.location.search || "");
    var imdbId = params.get("imdb") || "";
    var srcFromQuery = params.get("src") || "";
    var posterFromQuery = params.get("poster") || "";
    if (imdbId) video.setAttribute("data-imdb", imdbId);
    if (srcFromQuery) video.setAttribute("data-src", srcFromQuery);
    if (posterFromQuery) video.setAttribute("poster", posterFromQuery);

    var streamUrl = video.getAttribute("data-src") || window.FLUID_STREAM_URL || "";
    if (!streamUrl) return;

    var source = video.querySelector('source[type="application/vnd.apple.mpegurl"]');
    if (!source) {
      source = document.createElement("source");
      source.type = "application/vnd.apple.mpegurl";
      video.appendChild(source);
    }
    source.src = streamUrl;

    var ua = navigator.userAgent || "";
    var isAppleMobile = /iP(hone|od|ad)/.test(ua) || (ua.includes("Macintosh") && navigator.maxTouchPoints > 1);
    var hlsInstance = null;
    var fluidInstance = null;
    var qualityMode = "auto";
    var adActive = false;
    var hlsRestoreTimer = null;

    var quickbar = document.getElementById("quality-quickbar");
    var settingsTrigger = document.getElementById("settings-trigger");
    var qualityList = document.getElementById("settings-quality-list");

    function setSettingsEnabled(enabled) {
      if (settingsTrigger) settingsTrigger.disabled = !enabled;
    }
    function closeMenu() {
      if (qualityList) qualityList.style.display = "none";
      if (quickbar) quickbar.classList.remove("is-open");
    }
    function toggleMenu() {
      if (!qualityList) return;
      if (qualityList.style.display === "block") closeMenu();
      else {
        qualityList.style.display = "block";
        if (quickbar) quickbar.classList.add("is-open");
      }
    }
    function eachQualityItem(cb) {
      if (!qualityList) return;
      var items = qualityList.querySelectorAll("button[data-quality]");
      for (var i = 0; i < items.length; i += 1) cb(items[i]);
    }
    function setActiveQuality(value) {
      eachQualityItem(function (btn) {
        if (btn.getAttribute("data-quality") === value) btn.classList.add("is-active");
        else btn.classList.remove("is-active");
      });
    }
    function applyQuality(value) {
      qualityMode = value;
      setActiveQuality(value);
      if (!hlsInstance) {
        closeMenu();
        return;
      }
      if (value === "auto") hlsInstance.currentLevel = -1;
      else {
        var idx = parseInt(value, 10);
        if (!isNaN(idx)) hlsInstance.currentLevel = idx;
      }
      closeMenu();
    }
    function bindQualityButtons() {
      eachQualityItem(function (btn) {
        btn.onclick = function (event) {
          if (event) event.stopPropagation();
          applyQuality(btn.getAttribute("data-quality") || "auto");
        };
      });
    }
    function fillQualityMenu(levels) {
      if (!qualityList) return;
      qualityList.innerHTML = "";
      var autoBtn = document.createElement("button");
      autoBtn.type = "button";
      autoBtn.className = "quality-item";
      autoBtn.setAttribute("data-quality", "auto");
      autoBtn.textContent = "auto";
      qualityList.appendChild(autoBtn);
      if (Array.isArray(levels)) {
        levels.forEach(function (lvl, index) {
          var label = (lvl.height ? lvl.height + "p" : "") || (lvl.bitrate ? Math.round(lvl.bitrate / 1000) + "kbps" : "level " + index);
          var item = document.createElement("button");
          item.type = "button";
          item.className = "quality-item";
          item.setAttribute("data-quality", String(index));
          item.textContent = label;
          qualityList.appendChild(item);
        });
      }
      bindQualityButtons();
      setActiveQuality(qualityMode);
    }

    function setupNativeMode() {
      video.src = streamUrl;
      fillQualityMenu([]);
      setSettingsEnabled(true);
    }
    function setupHlsJsMode() {
      if (!window.Hls || !Hls.isSupported()) {
        setupNativeMode();
        return null;
      }
      hlsInstance = new Hls({
        startLevel: 0,
        capLevelToPlayerSize: true,
        testBandwidth: true,
        lowLatencyMode: false,
        abrEwmaDefaultEstimate: 300000,
        abrBandWidthFactor: 0.8,
        abrBandWidthUpFactor: 0.6,
        abrEwmaFastVoD: 3.0,
        abrEwmaSlowVoD: 9.0,
        maxBufferLength: 6,
        maxMaxBufferLength: 10,
        maxBufferSize: 12000000,
        maxBufferHole: 0.5,
        backBufferLength: 20,
      });
      setSettingsEnabled(true);
      hlsInstance.on(Hls.Events.MANIFEST_PARSED, function () {
        fillQualityMenu(hlsInstance.levels || []);
        applyQuality(qualityMode);
      });
      hlsInstance.attachMedia(video);
      hlsInstance.on(Hls.Events.MEDIA_ATTACHED, function () {
        hlsInstance.loadSource(streamUrl);
      });
      return hlsInstance;
    }

    function reattachHlsAfterAd() {
      if (isAppleMobile) return;
      if (hlsRestoreTimer) clearTimeout(hlsRestoreTimer);
      hlsRestoreTimer = setTimeout(function () {
        var resumeTime = video.currentTime || 0;
        var shouldResumePlay = !video.paused;
        if (hlsInstance && typeof hlsInstance.destroy === "function") {
          try { hlsInstance.destroy(); } catch (e) {}
        }
        var restored = setupHlsJsMode();
        if (!restored) return;
        restored.on(Hls.Events.MANIFEST_PARSED, function () {
          if (resumeTime > 0) {
            try { video.currentTime = resumeTime; } catch (e) {}
          }
          applyQuality(qualityMode);
          if (shouldResumePlay) {
            setTimeout(function () {
              var p = video.play();
              if (p && typeof p.catch === "function") p.catch(function () {});
            }, 180);
          }
        });
      }, 120);
    }

    var fpConfig = {
      layoutControls: {
        fillToContainer: true,
        responsive: true,
        autoPlay: false,
        playbackRateControl: false,
        qualityControl: false,
        contextMenu: {
          controls: true,
          links: []
        }
      },
      vastOptions: {
        adList: [
          { roll: "preRoll", vastTag: PRE_ROLL_VAST_TAG },
          { roll: "midRoll", vastTag: MID_ROLL_VAST_TAG, timer: 600 }
        ],
        skipButtonCaption: "Skip ad in [seconds]",
        skipButtonClickCaption: "Skip ad",
        vastAdvanced: {
          vastVideoEndedCallback: function () {
            adActive = false;
            console.log("adCompleted");
            reattachHlsAfterAd();
          },
          vastVideoSkippedCallback: function () {
            adActive = false;
            console.log("adSkipped");
            reattachHlsAfterAd();
          },
          noVastVideoCallback: function () {
            adActive = false;
            console.log("adError");
            reattachHlsAfterAd();
          }
        }
      }
    };

    if (typeof fluidPlayer === "function") {
      fluidInstance = fluidPlayer(video, fpConfig);
      if (fluidInstance && typeof fluidInstance.on === "function") {
        fluidInstance.on("play", function (arg1, arg2) {
          var info = typeof arg2 !== "undefined" ? arg2 : arg1;
          var mediaSourceType = info && info.mediaSourceType ? info.mediaSourceType : "source";
          if (mediaSourceType !== "source" && !adActive) {
            adActive = true;
            console.log("adStarted");
          }
        });
        fluidInstance.on("ended", function (arg1, arg2) {
          var info = typeof arg2 !== "undefined" ? arg2 : arg1;
          var mediaSourceType = info && info.mediaSourceType ? info.mediaSourceType : "source";
          if (mediaSourceType !== "source") {
            adActive = false;
            console.log("adCompleted");
          }
        });
      }
    }

    if (settingsTrigger) {
      settingsTrigger.addEventListener("click", function (event) {
        if (event) event.stopPropagation();
        toggleMenu();
      });
    }
    document.addEventListener("click", function (event) {
      if (!quickbar || !event || !event.target || !quickbar.contains(event.target)) closeMenu();
    });

    function mountSettingsInPlayer(attempt) {
      if (!quickbar) return;
      var wrapper = video.parentElement && video.parentElement.classList && video.parentElement.classList.contains("fluid_video_wrapper")
        ? video.parentElement
        : null;
      if (!wrapper) {
        if (attempt >= 12) return;
        setTimeout(function () {
          mountSettingsInPlayer(attempt + 1);
        }, 120);
        return;
      }
      quickbar.classList.add("in-player");
      if (quickbar.parentElement !== wrapper) wrapper.appendChild(quickbar);
    }

    fillQualityMenu([]);
    setSettingsEnabled(false);
    mountSettingsInPlayer(0);
    if (isAppleMobile) setupNativeMode();
    else setupHlsJsMode();
  })();
</script>
