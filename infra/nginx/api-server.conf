# ─────────────────────────────────────────────────────────────────
# API Server — nginx config
# Сервер: 178.104.100.36
# Домены: admin.pimor.online, api.pimor.online, pimor.online
# Путь на сервере: /etc/nginx/sites-available/pimor.conf
# ─────────────────────────────────────────────────────────────────

# ── admin.pimor.online → frontend:3000 ────────────────────────────
server {
    listen 443 ssl;
    server_name admin.pimor.online;

    ssl_certificate     /etc/letsencrypt/live/admin.pimor.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.pimor.online/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── api.pimor.online → api:8000 ───────────────────────────────────
server {
    listen 443 ssl;
    server_name api.pimor.online;

    ssl_certificate     /etc/letsencrypt/live/api.pimor.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.pimor.online/privkey.pem;

    client_max_body_size 60g;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}

# ── pimor.online → 404 заглушка ───────────────────────────────────
server {
    listen 443 ssl;
    server_name pimor.online;

    ssl_certificate     /etc/letsencrypt/live/api.pimor.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.pimor.online/privkey.pem;

    return 404;
}

# ── t.pimor.online → wt-tracker:8050 (WebSocket) ───────────
server {
    listen 443 ssl;
    server_name t.pimor.online;

    ssl_certificate     /etc/letsencrypt/live/t.pimor.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/t.pimor.online/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8050;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────
server {
    listen 80;
    server_name admin.pimor.online api.pimor.online pimor.online t.pimor.online;
    return 301 https://$host$request_uri;
}
