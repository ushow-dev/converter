# ─────────────────────────────────────────────────────────────────
# Storage Server — nginx config
# Сервер: 45.134.174.84
# Домены: media.pimor.online, player.pimor.online
# Путь на сервере: /etc/nginx/sites-available/pimor.conf
# ─────────────────────────────────────────────────────────────────

# ── media.pimor.online → HLS файлы на /storage ────────────────────
server {
    listen 443 ssl;
    server_name media.pimor.online;

    ssl_certificate     /etc/letsencrypt/live/media.pimor.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/media.pimor.online/privkey.pem;

    root /storage;

    location / {
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control 'public, max-age=31536000';
        try_files $uri =404;
    }
}

# ── player.pimor.online → ptrack-player:3100 ──────────────────────
server {
    listen 443 ssl;
    server_name player.pimor.online;

    ssl_certificate     /etc/letsencrypt/live/player.pimor.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/player.pimor.online/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────
server {
    listen 80;
    server_name media.pimor.online player.pimor.online;
    return 301 https://$host$request_uri;
}
