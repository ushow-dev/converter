# ─────────────────────────────────────────────────────────────────
# API Server — Docker Compose
# Сервисы для сервера с API, Admin UI и базой данных.
# Worker и torrent-клиенты запускаются отдельно (docker-compose.worker.yml).
#
# Использование:
#   docker compose -f docker-compose.api.yml up -d
#   docker compose -f docker-compose.api.yml build
# ─────────────────────────────────────────────────────────────────

services:

  # ── Persistence ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_net
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - app_net
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Core API ──────────────────────────────────────────────────
  api:
    build:
      context: ./api
    image: ${API_IMAGE:-app/api}:${APP_IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      PORT:              ${API_PORT:-8000}
      DATABASE_URL:      "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      REDIS_URL:         "redis://redis:6379"
      # Prowlarr работает на worker-сервере, доступен по внешнему адресу
      PROWLARR_BASE_URL: ${PROWLARR_BASE_URL}
      PROWLARR_API_KEY:  ${PROWLARR_API_KEY}
      JWT_SECRET:        ${JWT_SECRET}
      PLAYER_API_KEY:    ${PLAYER_API_KEY}
      MEDIA_BASE_URL:    ${MEDIA_BASE_URL:-}
      MEDIA_SIGNING_KEY: ${MEDIA_SIGNING_KEY:-}
      MEDIA_SIGNING_TTL: ${MEDIA_SIGNING_TTL:-2m}
      ADMIN_EMAIL:       ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD:    ${ADMIN_PASSWORD}
      MEDIA_ROOT:        /media
      TMDB_API_KEY:             ${TMDB_API_KEY:-}
      OPENSUBTITLES_API_KEY:    ${OPENSUBTITLES_API_KEY:-}
      SUBTITLE_LANGUAGES:       ${SUBTITLE_LANGUAGES:-en,bn,hi}
      SCANNER_API_URL:          ${SCANNER_API_URL:-}
      INGEST_SERVICE_TOKEN:     ${INGEST_SERVICE_TOKEN:-}
      # Storage server rclone remote for subtitle sync
      STORAGE_REMOTE:           ${STORAGE_REMOTE:-}
      STORAGE_REMOTE_PATH:      ${STORAGE_REMOTE_PATH:-/storage}
      RCLONE_CONFIG_STORAGE_TYPE:     ${RCLONE_CONFIG_STORAGE_TYPE:-sftp}
      RCLONE_CONFIG_STORAGE_HOST:     ${RCLONE_CONFIG_STORAGE_HOST:-}
      RCLONE_CONFIG_STORAGE_USER:     ${RCLONE_CONFIG_STORAGE_USER:-}
      RCLONE_CONFIG_STORAGE_KEY_FILE: ${RCLONE_CONFIG_STORAGE_KEY_FILE:-}
    volumes:
      - ${MEDIA_PATH:-./media}:/media
      - ./secrets:/secrets:ro
    networks:
      - app_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:${API_PORT:-8000}/health/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # ── Monitoring ────────────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - app_net
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - app_net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER:     ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL:         https://monitor.pimor.online
      GF_SERVER_DOMAIN:           monitor.pimor.online
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP:     "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - app_net
    depends_on:
      - prometheus
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── P2P Tracker ──────────────────────────────────────────────
  wt-tracker:
    build:
      context: ./infra/wt-tracker
    image: app/wt-tracker:latest
    restart: unless-stopped
    networks:
      - app_net
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── Admin Frontend ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
    image: ${FRONTEND_IMAGE:-app/frontend}:${APP_IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      API_URL:    http://api:8000
      PLAYER_URL: ${PLAYER_URL:-}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - app_net
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# ─────────────────────────────────────────────────────────────────
networks:
  app_net:
    driver: bridge

# ─────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
