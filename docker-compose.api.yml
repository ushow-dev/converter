# ─────────────────────────────────────────────────────────────────
# API Server — Docker Compose
# Сервисы для сервера с API, Admin UI и базой данных.
# Worker и torrent-клиенты запускаются отдельно (docker-compose.worker.yml).
#
# Использование:
#   docker compose -f docker-compose.api.yml up -d
#   docker compose -f docker-compose.api.yml build
# ─────────────────────────────────────────────────────────────────

services:

  # ── Persistence ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_net
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - app_net
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Core API ──────────────────────────────────────────────────
  api:
    build:
      context: ./api
    image: ${API_IMAGE:-app/api}:${APP_IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      PORT:              ${API_PORT:-8000}
      DATABASE_URL:      "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      REDIS_URL:         "redis://redis:6379"
      # Prowlarr работает на worker-сервере, доступен по внешнему адресу
      PROWLARR_BASE_URL: ${PROWLARR_BASE_URL}
      PROWLARR_API_KEY:  ${PROWLARR_API_KEY}
      JWT_SECRET:        ${JWT_SECRET}
      PLAYER_API_KEY:    ${PLAYER_API_KEY}
      MEDIA_BASE_URL:    ${MEDIA_BASE_URL:-}
      MEDIA_SIGNING_KEY: ${MEDIA_SIGNING_KEY:-}
      MEDIA_SIGNING_TTL: ${MEDIA_SIGNING_TTL:-2m}
      ADMIN_EMAIL:       ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD:    ${ADMIN_PASSWORD}
      MEDIA_ROOT:        /media
      TMDB_API_KEY:             ${TMDB_API_KEY:-}
      OPENSUBTITLES_API_KEY:    ${OPENSUBTITLES_API_KEY:-}
      SUBTITLE_LANGUAGES:       ${SUBTITLE_LANGUAGES:-en,bn,hi}
      SCANNER_API_URL:          ${SCANNER_API_URL:-}
      INGEST_SERVICE_TOKEN:     ${INGEST_SERVICE_TOKEN:-}
    volumes:
      - ${MEDIA_PATH:-./media}:/media
    networks:
      - app_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:${API_PORT:-8000}/health/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # ── Admin Frontend ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
    image: ${FRONTEND_IMAGE:-app/frontend}:${APP_IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      API_URL:    http://api:8000
      PLAYER_URL: ${PLAYER_URL:-}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - app_net
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# ─────────────────────────────────────────────────────────────────
networks:
  app_net:
    driver: bridge

# ─────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
